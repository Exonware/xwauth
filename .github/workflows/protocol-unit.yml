name: Protocol unit (discovery metadata)

on:
  pull_request:
    paths:
      - "src/exonware/xwauth/oauth_http/**"
      - "tests/1.unit/oauth_http_tests/**"
      - ".github/workflows/protocol-unit.yml"
  push:
    branches: [main, develop]

jobs:
  oauth-http-metadata:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install and test
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -e .
          pytest tests/1.unit/oauth_http_tests/ -q --tb=short
