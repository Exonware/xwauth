name: Protocol Governance Gate

on:
  pull_request:
    paths:
      - "docs/REF_54_PROTOCOL_DEVIATION_REGISTER.md"
      - "scripts/protocol_governance_check.py"
      - ".github/workflows/protocol-governance.yml"
  push:
    branches: [main, develop]
  schedule:
    - cron: "0 9 * * 1"

jobs:
  governance-check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [A, B, C]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate deviation register governance
        run: |
          python scripts/protocol_governance_check.py \
            --register docs/REF_54_PROTOCOL_DEVIATION_REGISTER.md \
            --profile ${{ matrix.profile }}
