# GUIDE_51: every custom mark used in tests must be listed (addopts includes --strict-markers).
[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto

markers =
    xwauth_core: Core functionality and integration tests
    xwauth_unit: Unit tests for individual components
    xwauth_integration: Integration tests across modules
    xwauth_advance: Advance quality tests (v1.0.0+)
    xwauth_security: Security excellence tests (Priority #1)
    xwauth_usability: Usability excellence tests (Priority #2)
    xwauth_maintainability: Maintainability excellence tests (Priority #3)
    xwauth_performance: Performance excellence tests (Priority #4)
    xwauth_extensibility: Extensibility excellence tests (Priority #5)
    asyncio: Async tests (pytest-asyncio)
    slow: Slow running tests

addopts =
    -v
    --tb=short
    --strict-markers
    -x

